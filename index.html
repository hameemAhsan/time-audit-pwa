<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="description" content="24-hour time audit and productivity tracker PWA" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Time Audit" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Time Audit PWA</title>
</head>
<body>
  <noscript>
    <div class="noscript">This app needs JavaScript enabled because all data is stored and processed locally in your browser.</div>
  </noscript>

  <div id="appShell" class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="currentDateLabel">Today</p>
        <h1 id="screenTitle">Time Audit</h1>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="installBtn" hidden title="Install app">Install</button>
        <button class="icon-btn" id="themeToggle" title="Toggle theme">◐</button>
      </div>
    </header>

    <main id="app" class="content" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-item active" data-screen="today" aria-label="Today">
        <span>⌂</span><strong>Today</strong>
      </button>
      <button class="nav-item nav-add" data-screen="add" aria-label="Add Activity">
        <span>＋</span><strong>Add</strong>
      </button>
      <button class="nav-item" data-screen="timer" aria-label="Pomodoro Timer">
        <span>◷</span><strong>Timer</strong>
      </button>
      <button class="nav-item" data-screen="reports" aria-label="Reports">
        <span>▣</span><strong>Reports</strong>
      </button>
      <button class="nav-item" data-screen="settings" aria-label="Settings">
        <span>⚙</span><strong>Settings</strong>
      </button>
    </nav>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <template id="modalTemplate">
    <div class="modal-backdrop" data-close-modal>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-head">
          <h2 id="modalTitle"></h2>
          <button class="icon-btn" data-close-modal aria-label="Close">×</button>
        </div>
        <div id="modalBody"></div>
      </section>
    </div>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
